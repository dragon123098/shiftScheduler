<head>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<header>
    <h1>Shift Scheduler</h1>
</header>
<main>
    <!-- this uses form submission. I was using a Fetch API before but I think this is simpler for a login form. -->
    <div class="content">
        <form id="loginForm" method="POST" action="/login">
            <div style="margin-bottom:12px;">
                <label for="username">Username</label><br>
                <input id="username" name="username" type="text" placeholder="Enter username" required style="width:100%; padding:8px; margin-top:4px;">
            </div>

            <div style="margin-bottom:12px;">
                <label for="password">Password</label><br>
                <input id="password" name="password" type="password" placeholder="Enter password" required style="width:100%; padding:8px; margin-top:4px;">
            </div>

            <button type="submit" style="padding:10px 16px;">Login</button>
        </form>

        {{if .Message}}
        <div style="margin-top:12px; color:red;">
            {{.Message}}
        </div>
        {{end}}
    </div>
</main>
<footer>
    <p>&copy; 2026 Shift Scheduler</p>
</footer>

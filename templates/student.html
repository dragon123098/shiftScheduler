{{$schedule := .Schedule}}
<head>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<header>
    <h1>Shift Scheduler</h1>
</header>
<main>
    <div class="content">
        <h2>Weekly Shift Schedule</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 1rem;">Click and drag to select your shift hours (8am–6pm). Each block represents 10 minutes.</p>
        
        <div class="schedule-container" style="position: relative;">
            <div id="scheduleGrid" style="display: grid; grid-template-columns: 80px repeat(60, 1fr); gap: 0;">
            </div>
            <div class="grid-ticks" aria-hidden="true"></div>
        </div>
        
        <form id="scheduleForm" class="schedule-form">
            <button type="submit">Save Schedule</button>
        </form>
    </div>
    
    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
        const startHour = 8;
        const endHour = 18;
        const blocksPerHour = 6; // 10-minute blocks
        const totalBlocks = (endHour - startHour) * blocksPerHour; // 60 blocks
        
        let isDragging = false;
        let dragStart = null;
        let currentDragSelection = {
            Monday: new Set(),
            Tuesday: new Set(),
            Wednesday: new Set(),
            Thursday: new Set(),
            Friday: new Set()
        };
        let persistedSelection = {
            Monday: new Set(),
            Tuesday: new Set(),
            Wednesday: new Set(),
            Thursday: new Set(),
            Friday: new Set()
        };
        const selection = {
            Monday: [0.0, 0.0],
            Tuesday: [0.0, 0.0],
            Wednesday: [0.0, 0.0],
            Thursday: [0.0, 0.0],
            Friday: [0.0, 0.0]
        };
        
        // Initialize grid
        const grid = document.getElementById('scheduleGrid');
        
        // Create header row with time labels
        const emptyHeader = document.createElement('div');
        emptyHeader.className = 'grid-header-empty';
        emptyHeader.textContent = 'Time';
        grid.appendChild(emptyHeader);
        
        // Add time headers (one label per hour = 6 blocks)
        for (let i = 0; i < 10; i++) {
            const hour = startHour + i;
            const hourLabel = hour > 12 ? (hour - 12) + 'pm' : (hour === 12 ? '12pm' : hour + 'am');
            const header = document.createElement('div');
            header.className = 'grid-header-time';
            header.style.gridColumn = 'span 6';
            header.textContent = hourLabel;
            grid.appendChild(header);
        }
        
        // Create day rows
        for (let dayIdx = 0; dayIdx < days.length; dayIdx++) {
            const day = days[dayIdx];
            
            // Day label
            const dayLabel = document.createElement('div');
            dayLabel.className = 'day-label';
            dayLabel.textContent = day.slice(0, 3);
            grid.appendChild(dayLabel);
            
            // Schedule blocks for this day
            for (let blockIdx = 0; blockIdx < totalBlocks; blockIdx++) {
                const hour = startHour + Math.floor(blockIdx / 6);
                const min = (blockIdx % 6) * 10;
                
                const block = document.createElement('div');
                block.dataset.day = day;
                block.dataset.blockIdx = blockIdx;
                block.dataset.hour = hour;
                block.dataset.min = min;
                block.className = 'schedule-block';
                
                block.addEventListener('mousedown', startDrag);
                block.addEventListener('mouseover', dragOver);
                block.addEventListener('mouseup', endDrag);
                
                grid.appendChild(block);
            }
        }
        
        function updateVisualization() {
            document.querySelectorAll('.schedule-block').forEach(block => {
                const day = block.dataset.day;
                const blockIdx = parseInt(block.dataset.blockIdx);
                
                if (currentDragSelection[day].has(blockIdx)) {
                    block.style.background = 'rgba(255,140,140,0.6)';
                    block.style.boxShadow = '0 0 0 2px rgba(255,140,140,0.25)';
                } else if (persistedSelection[day].has(blockIdx)) {
                    block.style.background = 'rgba(88,205,170,0.55)';
                    block.style.boxShadow = 'inset 0 1px 2px rgba(0, 0, 0, 0.06)';
                } else {
                    block.style.background = 'transparent';
                    block.style.boxShadow = 'none';
                }
            });
        }
        
        function startDrag(e) {
            if (e.button !== 0) return;
            isDragging = true;
            dragStart = {
                day: e.target.dataset.day,
                blockIdx: parseInt(e.target.dataset.blockIdx)
            };
            // Clear current drag selection (but keep persisted)
            for (const day in currentDragSelection) {
                currentDragSelection[day].clear();
            }
        }
        
        function dragOver(e) {
            if (!isDragging || !dragStart) return;
            
            const currentDay = e.target.dataset.day;
            const currentBlockIdx = parseInt(e.target.dataset.blockIdx);
            
            if (!currentDay || isNaN(currentBlockIdx)) return;
            if (currentDay !== dragStart.day) return;
            
            // Clear current drag selection for this day
            currentDragSelection[dragStart.day].clear();
            
            const minBlock = Math.min(dragStart.blockIdx, currentBlockIdx);
            const maxBlock = Math.max(dragStart.blockIdx, currentBlockIdx);
            
            for (let i = minBlock; i <= maxBlock; i++) {
                currentDragSelection[dragStart.day].add(i);
            }
            
            updateVisualization();
        }
        
        function endDrag(e) {
            if (!isDragging || !dragStart) {
                isDragging = false;
                return;
            }
            
            isDragging = false;
            
            // Move current drag selection to persisted
            const daySelection = currentDragSelection[dragStart.day];
            if (daySelection.size > 0) {
                persistedSelection[dragStart.day] = new Set(daySelection);
                
                const blockIndices = Array.from(daySelection).sort((a, b) => a - b);
                const minBlock = Math.min(...blockIndices);
                const maxBlock = Math.max(...blockIndices);
                
                //Here is where I convert the block indices to actual hours and minutes. Each block is 10 minutes, so I divide by 6 to get hours and take the remainder to get minutes.
                const startHourVal = startHour + Math.round((minBlock / 6) * 1000) / 1000;;
                const endHourVal = startHour + Math.round((maxBlock + 1) / 6 * 1000) / 1000;
                
                selection[dragStart.day] = [startHourVal, endHourVal];
            } else {
                persistedSelection[dragStart.day].clear();
                selection[dragStart.day] = [0, 0];
            }
            
            currentDragSelection[dragStart.day].clear();
            updateVisualization();
        }
        
        // Initialize persisted schedule from passed-in schedule
        const sched_mon = [{{if $schedule}}{{index $schedule.Monday 0}}, {{index $schedule.Monday 1}}{{else}}0, 0{{end}}];
        const sched_tue = [{{if $schedule}}{{index $schedule.Tuesday 0}}, {{index $schedule.Tuesday 1}}{{else}}0, 0{{end}}];
        const sched_wed = [{{if $schedule}}{{index $schedule.Wednesday 0}}, {{index $schedule.Wednesday 1}}{{else}}0, 0{{end}}];
        const sched_thu = [{{if $schedule}}{{index $schedule.Thursday 0}}, {{index $schedule.Thursday 1}}{{else}}0, 0{{end}}];
        const sched_fri = [{{if $schedule}}{{index $schedule.Friday 0}}, {{index $schedule.Friday 1}}{{else}}0, 0{{end}}];
        
        const passedSchedule = {
            Monday: sched_mon,
            Tuesday: sched_tue,
            Wednesday: sched_wed,
            Thursday: sched_thu,
            Friday: sched_fri
        };
        
        // Populate persisted selection and selection from passed schedule
        for (const day in passedSchedule) {
            const [startHourVal, endHourVal] = passedSchedule[day];
            if (startHourVal > 0 && endHourVal > 0) {
                selection[day] = [startHourVal, endHourVal];
                
                // Convert hours back to block indices
                const startBlockIdx = Math.round((startHourVal - startHour) * blocksPerHour);
                const endBlockIdx = Math.round((endHourVal - startHour) * blocksPerHour) - 1;
                        
                for (let i = startBlockIdx; i <= endBlockIdx; i++) {
                    if (i >= 0 && i < totalBlocks) {
                        persistedSelection[day].add(i);
                    }
                }
            }
        }
        
        // Render the preset schedule
        updateVisualization();
        
        document.getElementById('scheduleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            fetch('/save', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(selection)
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
                alert('Schedule saved successfully!');
            })
            .catch((error) => {
                console.error('Error:', error);
                alert('Error saving schedule');
            });
        });
    </script>
</main>
<footer>
    <p>&copy; 2026 Shift Scheduler</p>
</footer>
